name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: Build iOS App (Unsigned)
        run: |
          xcodebuild -project Xogot.xcodeproj \
          -scheme Xogot \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          PROVISIONING_PROFILE_SPECIFIER="" \
          clean build -derivedDataPath ./build

      - name: Create Unsigned IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/Xogot.app Payload/
          zip -r Xogot.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xogot-Unsigned-IPA
          path: Xogot.ipa
